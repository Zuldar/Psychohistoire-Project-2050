name: Mise à jour Mensuelle Psychohistoire
on:
  schedule:
    - cron: '0 10 15 * *'  # Le 15 de chaque mois à 10h UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-model:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
    - name: 📥 Récupération du dépôt
      uses: actions/checkout@v4

    - name: 🐍 Installation de Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: 🧠 Exécution du modèle Psychohistorique
      run: |
        python src/Seldon.py

    - name: 💾 Commit et Push (Mode Robuste)
      run: |
        git config --global user.name 'Psychohistory Bot'
        git config --global user.email 'bot@psychohistory.com'
        
        # On ajoute TOUS les fichiers modifiés (plus simple)
        git add .
        
        # On vérifie s'il y a des changements à sauvegarder
        if git diff --staged --quiet; then
          echo "Aucun changement détecté. Tout est à jour."
        else
          git commit -m "🔮 Mise à jour : Projection Seldon 2036"
          
          # C'EST ICI QUE LA MAGIE OPÈRE : On récupère tes modifs avant d'envoyer
          git pull --rebase origin main
          
          git push origin HEAD:main
     
        fi
